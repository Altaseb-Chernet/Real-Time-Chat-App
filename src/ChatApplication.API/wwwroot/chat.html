<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp</title>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<div class="chat-layout">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><span class="dot"></span>ChatApp</div>
      <button class="btn-icon" onclick="openNewRoomModal()" title="New room">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="section-label">Rooms</div>
    <div class="room-list" id="room-list">
      <div style="padding:.5rem;font-size:.8rem;color:var(--text-muted)">Loading…</div>
    </div>
    <div class="sidebar-footer">
      <div class="avatar lg" id="user-avatar">?
        <span class="status-badge online"></span>
      </div>
      <div class="user-info">
        <div class="name"  id="user-name">—</div>
        <div class="email" id="user-status">Online</div>
      </div>
      <button class="btn-icon danger" onclick="logout()" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────── -->
  <main class="chat-main">

    <div class="empty-state" id="no-room-state">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <h3>No room selected</h3>
      <p>Pick a room from the sidebar or create a new one to start chatting.</p>
      <button class="btn btn-primary" style="width:auto;margin-top:.5rem" onclick="openNewRoomModal()">+ Create a Room</button>
    </div>

    <div id="active-room" style="display:none;flex-direction:column;height:100%;overflow:hidden">
      <div class="chat-header">
        <div>
          <div class="room-title"><span class="hash">#</span><span id="active-room-name">—</span></div>
          <div class="room-subtitle" id="active-room-meta"></div>
        </div>
        <div style="display:flex;gap:.25rem">
          <button class="btn-icon" onclick="loadMessages(currentRoomId)" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn-icon danger" onclick="leaveCurrentRoom()" title="Leave room">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="messages-area" id="messages-area"></div>
      <div class="typing-bar" id="typing-bar"></div>

      <div class="chat-input-area">
        <div class="edit-banner" id="edit-banner">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span>Editing: <strong id="edit-preview"></strong></span>
          <button class="cancel-edit" onclick="cancelEdit()">✕</button>
        </div>
        <div class="input-wrapper">
          <input type="text" id="msg-input" placeholder="Message…" autocomplete="off"
                 onkeydown="handleInputKey(event)" oninput="handleTyping()"/>
          <button class="send-btn" id="send-btn" onclick="sendOrEdit()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Presence ──────────────────────────────────────── -->
  <aside class="presence-panel">
    <div class="presence-header">
      <span>Online</span>
      <span class="online-count-badge" id="online-count">0</span>
    </div>
    <div class="online-list" id="online-list">
      <div style="padding:.5rem;font-size:.78rem;color:var(--text-muted)">No one online yet</div>
    </div>
  </aside>
</div>

<!-- New room modal -->
<div class="modal-overlay" id="new-room-modal">
  <div class="modal">
    <h3>Create a Room</h3>
    <div class="form-group">
      <label>Room name</label>
      <input type="text" id="new-room-name" placeholder="e.g. general" maxlength="50"
             onkeydown="if(event.key==='Enter') createRoom()"/>
    </div>
    <div class="error-msg" id="room-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeNewRoomModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" id="ctx-edit" onclick="ctxEdit()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Edit
  </div>
  <div class="ctx-item" id="ctx-copy" onclick="ctxCopy()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    Copy text
  </div>
  <div class="ctx-item danger" id="ctx-delete" onclick="ctxDelete()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6M14 11v6"/>
    </svg>
    Delete
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
