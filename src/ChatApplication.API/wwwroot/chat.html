<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div class="chat-layout">

  <!-- ── Left sidebar: rooms ─────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span><span class="logo-dot"></span>ChatApp</span>
      <button class="btn btn-ghost" style="padding:.35rem .6rem;font-size:.8rem" onclick="openNewRoomModal()">+ Room</button>
    </div>

    <div class="room-list" id="room-list">
      <div class="system-msg" style="padding:.75rem">Loading rooms…</div>
    </div>

    <div class="sidebar-footer">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="name" id="user-name">—</div>
        <div class="role" id="user-role">—</div>
      </div>
      <button class="btn btn-ghost" style="padding:.3rem .5rem;font-size:.75rem" onclick="logout()" title="Sign out">⏻</button>
    </div>
  </aside>

  <!-- ── Main chat area ──────────────────────────────── -->
  <main class="chat-main">
    <!-- No room selected -->
    <div class="empty-state" id="no-room-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select a room to start chatting</p>
    </div>

    <!-- Active room -->
    <div id="active-room" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div>
          <div class="room-name"><span style="color:var(--accent)">#</span> <span id="active-room-name">—</span></div>
          <div class="room-meta" id="active-room-meta"></div>
        </div>
        <button class="btn btn-ghost" style="padding:.35rem .65rem;font-size:.8rem;color:var(--danger)" onclick="leaveCurrentRoom()">Leave</button>
      </div>

      <div class="messages-area" id="messages-area"></div>

      <div class="typing-indicator" id="typing-indicator"></div>

      <div class="chat-input-area">
        <div class="input-box">
          <input type="text" id="msg-input" placeholder="Message #general…" autocomplete="off"
                 onkeydown="handleInputKey(event)" oninput="handleTyping()" />
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Right panel: online users ──────────────────── -->
  <aside class="presence-panel">
    <h3>Online — <span id="online-count">0</span></h3>
    <div class="online-list" id="online-list"></div>
  </aside>

</div>

<!-- New room modal -->
<div class="modal-overlay" id="new-room-modal">
  <div class="modal">
    <h3>Create a Room</h3>
    <div class="form-group">
      <label>Room name</label>
      <input type="text" id="new-room-name" placeholder="e.g. general" maxlength="50" />
    </div>
    <div class="error-msg" id="room-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeNewRoomModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- SignalR client from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
