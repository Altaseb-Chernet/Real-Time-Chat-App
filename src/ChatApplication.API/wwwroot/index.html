<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatApp — Sign In</title>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>ChatApp</span>
    </div>
    <p class="subtitle">Real-time messaging with .NET &amp; SignalR</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn">
        <span id="login-btn-text">Sign In</span>
        <span id="login-spinner" class="spinner" style="display:none"></span>
      </button>
      <div class="error-msg" id="login-error"></div>
    </form>

    <!-- Register -->
    <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="johndoe" required minlength="3" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary" type="submit" id="register-btn">
        <span id="register-btn-text">Create Account</span>
        <span id="register-spinner" class="spinner" style="display:none"></span>
      </button>
      <div class="error-msg" id="register-error"></div>
    </form>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>
