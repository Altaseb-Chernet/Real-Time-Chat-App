<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp — Sign In</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h1>💬 ChatApp</h1>
    <p class="subtitle">Real-time messaging, built with .NET &amp; SignalR</p>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn">Sign In</button>
      <div class="error-msg" id="login-error"></div>
    </form>

    <!-- Register form -->
    <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="johndoe" required minlength="3" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8" />
      </div>
      <button class="btn btn-primary" type="submit" id="register-btn">Create Account</button>
      <div class="error-msg" id="register-error"></div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
